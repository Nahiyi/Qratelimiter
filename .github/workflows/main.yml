name: QRateLimiter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Job 1: 单元测试
  test:
    name: Test (JDK ${{ matrix.java }} on ${{ matrix.os }})
    strategy:
      fail-fast: true  # 失败停止
      matrix:
        os: [ubuntu-latest, windows-latest]
        java: [8, 11, 17]
    runs-on: ${{ matrix.os }}

    steps:
      # Step 1: 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: 设置 JDK 版本
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      # Step 3: 执行 Maven 编译 + 单元测试
      # 说明：
      #   - 默认矩阵不启动 Redis，Redis 相关测试会在服务不可用时通过 JUnit assumption 跳过
      #   - Redis 真实路径由下方 redis-verification job 在 Ubuntu 上单独验证
      - name: Build and test with Maven
        run: mvn -B clean verify --file pom.xml

      # Step 4: 上传测试报告（方便排查失败原因）
      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.os }}-jdk${{ matrix.java }}
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/

  # Job 2: Redis 集成验证（Ubuntu 上启动 Redis 服务后运行）
  redis-verification:
    name: Redis verification (${{ matrix.name }})
    runs-on: ubuntu-latest
    env:
      QRL_REDIS_TESTS_ENABLED: true
      QRL_REDIS_HOST: localhost
      QRL_REDIS_PORT: "6379"
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: "Boot 2 / JDK 8"
            java: 8
            maven_profile: ""
          - name: "Boot 3 / JDK 17"
            java: 17
            maven_profile: "-Pspring-boot-3"

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Verify Redis-backed tests
        run: mvn -B ${{ matrix.maven_profile }} clean verify --file pom.xml

      - name: Upload Redis test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: redis-test-reports-jdk${{ matrix.java }}
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/

  # Job 3: 可选压力测试 Profile 验证（确保 profile 可用，但不混入默认 Maven 生命周期）
  stress-verification:
    name: Stress profile verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: maven

      - name: Verify optional stress profile
        run: mvn -B -Pstress -pl qratelimiter-test -am test --file pom.xml

      - name: Upload stress test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/

  # Job 4: 代码风格与质量检查（仅在 Ubuntu + JDK 8 上运行一次即可）
  lint:
    name: Code quality check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: 'temurin'
          cache: maven

      # 检查 Maven 项目结构完整性（所有模块都能解析）
      - name: Validate project structure
        run: mvn -B validate --file pom.xml

  # Job 5: 构建产物检查，确保 Starter 可正常打包
  package:
    name: Package verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: 'temurin'
          cache: maven

      # 本地安装到 ~/.m2，验证整个链路：parent → autoconfigure → starter
      - name: Build and install to local Maven repo
        run: mvn -B clean install -DskipTests --file pom.xml

      # 从 pom.xml 读取当前版本号
      - name: Get project version
        id: get_version
        run: echo "version=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)" >> "$GITHUB_OUTPUT"

      # 确认 starter jar 被正确打包
      - name: Verify starter artifact
        run: |
          version="${{ steps.get_version.outputs.version }}"
          jar_path=$(find ~/.m2/repository/cn/clazs -name "qratelimiter-spring-boot-starter-${version}.jar" | head -1)
          if [ -n "$jar_path" ]; then
            echo "Starter JAR found at: $jar_path"
            jar tf "$jar_path" | head -20
          else
            echo "Starter JAR not found (version=${version})"
            exit 1
          fi
